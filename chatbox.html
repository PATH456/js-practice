<!DOCTYPE html>
<html>
  <head>
    <title>Chatbox</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script src = "https://unpkg.com/supersimpledev@8.6.4/dayjs.js"></script>
    <script type="text/babel">

      function App() {
        return (
          <>
          <ProductCard name = "Cotton socks" price = "10.90"/>
          <ProductCard name = "Tennis balls" price = "6.00" discountPrice = "4.95"/>
          <ProductCard name = "Plain T-shirt" price = "7.99"/>
          </>
        )
      }

      function ProductCard({name, price, discountPrice}) {
        return (
        <>
          <p>{name}</p>
          {!discountPrice && <p>Price: ${price} </p>}
          {discountPrice && (
            <>
            <del>Price: ${price}</del>
            <p>Discount Price: ${discountPrice} </p>
            </>
          )}
          <button>Add to cart</button>
        </>
      )}

     

      const container = document.querySelector('.js-container');
      const root = ReactDOM.createRoot(container);
      root.render(<App/>);
      
    
    </script>

  </body>
</html>
