<!DOCTYPE html>
<html>
  <head>
    <title>Product Description</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>

    <script type="text/babel" src="./ProductDescription.jsx"></script>
    <script type="text/babel">
      const productDescriptionText =
        'This OLED television includes a stunning 4K display, rich contrast, vibrant colors, and smooth motion for movies, sports, and gaming. It also features smart TV apps, voice control, multiple HDMI ports, and a slim modern design that fits beautifully into any living room.';

      const container = document.querySelector('.js-container');
      const root = ReactDOM.createRoot(container);

      root.render(
        <ProductDescription
          text={productDescriptionText}
          maxLength={50}
        />
      );
    </script>
  </body>
</html>
