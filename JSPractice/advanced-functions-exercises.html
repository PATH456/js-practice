<!DOCTYPE html>

<html>
  <head>
    <title>
      App
    </title>
  </head>

  <body>

    <button class = "addMessage" onclick = "message++">Add</button>
    <button class = "removeMessage" onclick = "message--">Remove</button>

    

    <script>
      let message = 1;
      function changeTitle() {
        if ((document.title === "App") && (message > 0)) {
          document.title = `(${message}) New Message`
        } else {
          document.title = "App";
        }
      }

      setInterval(changeTitle, 1000);

      
   
    

      




    </script>
  </body>

</html>
