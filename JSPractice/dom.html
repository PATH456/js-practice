<!DOCTYPE html>

<html>

  <head>
    <title>DOM Projects</title>

    <style>
      .subscribe-button{
        padding-top: 10px;
        padding-bottom: 10px;
        padding-left: 15px;
        padding-right: 15px;
        margin-bottom: 4rem;
        color: white;
        background-color:black;
        border-radius: 20px;
        width: 6rem;
        height: 2.4rem;
        font-weight: bold;
        cursor: pointer;
      }

      .calculate-button{
        background-color: green;
        color: white;
        height: 2.5rem;
        width: 6rem;
      }

      #user-input{
        height: 2.2rem;
        width: 12rem;
      }
      .active{
        background-color: white;
        color: black;
      }

    </style>

  </head>

  <body>

    <p>Youtube subscribe button</p>
    <button class = "subButton" onclick = "subButtonClick()">Subscribe</button>

    <p>Amazon Shipping Calculator</p>
    <p>Orders under $40 = +$10 shipping</p>
    <p>Orders over or equal to $40 = Free shipping</p>
    <input placeholder = "Cost of orders" type = number class = "orderCostInput">
    <button class = "calculateTotalCost" onclick = "calculateTotalCost()">Calculate</button>
    <p class = "totalCostAnnouncement"></p>
  




    <script>
      const subButton = document.body.querySelector('.subButton');
      function subButtonClick() {
        (subButton.innerHTML === "Subscribe") ? 
        subButton.innerHTML = "Subscribed" : subButton.innerHTML = "Subscribe";
      }

      const totalCostAnnouncement = document.body.querySelector('.totalCostAnnouncement');
      const orderCostInput = document.body.querySelector('.orderCostInput');

      
      function calculateTotalCost() {
        totalCost = (Number(orderCostInput.value) <= 40) ? 
        Number(orderCostInput.value) : Number(orderCostInput.value) + 10;
        totalCostAnnouncement.innerHTML = `Total: $${totalCost}`;
      }

      
      
      orderCostInput.addEventListener('keydown', (event) => {
        if (event.key === "Enter") {
          calculateTotalCost();
        }
      })
      



    </script>

  </body>
</html>
