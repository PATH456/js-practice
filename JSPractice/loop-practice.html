    <script>
      const nums = [10, 20, 30];
      nums[2] = 99;


      function getLastValueArray(array) {
        return array[array.length-1];
      }
      
      function arraySwap(array) {
        const tempValue = array[0];
        array[0] = array[array.length-1];
        array[array.length-1] = tempValue;
        return array;
      }

      let i = 0;
      while (i<= 10) {
        console.log(i)
        i+= 2;  
      }

      for (let i = 5; i >= 0; i-=2) {
        console.log(i);
      }

      function newArray(array) {
        const newArray = []
        for (let i = 0; i < array.length; i++) {
          newArray[i] = array[i] + 1;
        }
        return newArray;
      }

      function minMax(nums) {
        let result = {min: nums[0], max: nums[0]}
        // 
        if (nums.length === 0) {
          result.min = null;
          result.max = null;
        }
        //
        for (let i = 1; i < nums.length; i++) {
          if (nums[i] < result.min) {
            result.min = nums[i];
          } else if (nums[i] > result.max) {
            result.max = nums[i];
          }
        }
        return result;
      }

      function countWords(arrayString) {
        let result = {};
        for (let i = 0; i < arrayString.length; i++) {
          let word = arrayString[i];
          if (result[word]) {
            result[arrayString[i]]++;
          } else {
            result[arrayString[i]] = 1;
          }
        }
        return result;
      }

      console.log(countWords(['apple', 'banana', 'apple', 'banana']));



    </script>
