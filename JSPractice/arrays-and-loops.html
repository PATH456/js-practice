<!DOCTYPE html>
<html>
  <head>

    <title>Arrays and Loops</title>
    <link rel="stylesheet" href="todo-list.css">


  </head>

  <body>

    <p>Todo list</p>

    <div class = "container">
      <div class = "todo-row">
        <input class = "task" placeholder = "Todo name">
        <input class = "date" type = "date">
        <button class = "addTask">Add</button>
      </div>

      <div class = "toDoListHTML"></div>


    </div>
    
    

    <script>
      const arrayTask = [];
      const task = document.body.querySelector('.task');
      const date = document.body.querySelector('.date');
      const addTask = document.body.querySelector('.addTask');
      const display = document.body.querySelector('.toDoListHTML');

      function addTodo() {
        const taskObject = {
          name: task.value,
          date: date.value
        }
        arrayTask.push(taskObject);
      }

      function renderHTML() {
        display.innerHTML = ""
        for (let i = 0; i< arrayTask.length;i++) {
           const html = `
        <div class = 'todo-row'>
          <div>${arrayTask[i].name}</div> 
          <div>${arrayTask[i].date}</div> 
          <button class = "delButton" onclick = "
          arrayTask.splice(${i},1)
          renderHTML()
          ">Delete</button>
        </div>
        `;
        display.innerHTML += html;
        }
      }

      addTask.addEventListener("click", addTodo);
      addTask.addEventListener("click", renderHTML);

    </script>
  
  </body>
</html>
