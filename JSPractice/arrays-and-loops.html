<!DOCTYPE html>
<html>
  <head>

    <title>Arrays and Loops</title>

  </head>

  <body>

    <script>
      const myArray = [10, 20, 30];
      for (let i = 0; i < myArray.length; i++) {
        console.log(myArray[i]);
      }
      myArray.push(100);
      myArray.splice(0, 2);
      console.log(myArray);

    </script>
  
  </body>
</html>
