<!DOCTYPE html>
<head>
  <title>Variables</title>

</head>

<body>
  
<script>
  
  const name = "Henry";
  console.log(`My name is ${name}`);

  const coffeeCost = 5;
  const bagelCost = 3;
  const soupCost = 9;
  let cost = coffeeCost + bagelCost + soupCost;
  console.log(`Cost of food: $${cost}`);

  const tax = 0.1;
  cost = cost * tax + cost;
  console.log(`Real cost of food: $${cost}`);
  
</script>
  
</body>
</html>
