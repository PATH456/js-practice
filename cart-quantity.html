<!DOCTYPE html>
<head>
  <title>Cart</title>

  <style>
    button { 
      display: auto;
      margin: 1rem;
      font-size: 25px;
    }
  </style>

</head>

<body>
  <button class = "showQuantityButton" onclick = "showCartQuantity()">Show Quantity</button>

  <button class = "addButton" onclick = "checkMaxQuantity(1)
  showCartQuantity();"
  >Add to cart</button>

  <button class = "addTwoButton" onclick = "checkMaxQuantity(2)
  showCartQuantity()">+2</button>

  <button class = "removeButton" onclick = "checkMinQuantity(1)
   showCartQuantity();">Remove from cart</button>

   <button class = "removeTwoButton" onclick = "checkMinQuantity(2)
   showCartQuantity();">-2</button>
  <p class = "quantity"></p>

  <script>
    let cartQuantity = 0; 
    let quantityInfo = document.querySelector(".quantity");

    function showCartQuantity() {
      quantityInfo.innerHTML = `The cart quantity is ${cartQuantity}`; 
    }

    function checkMaxQuantity(increasedNum) {
      if (cartQuantity + increasedNum > 10) {
        alert("The shopping cart is full");
      } else {
        cartQuantity += increasedNum;
      }
    }

    function checkMinQuantity(decreasedNum) {
      if (cartQuantity - decreasedNum < 0) {
        cartQuantity = 0;
        alert("The shopping cart is empty now");
      } else {
        cartQuantity -= decreasedNum;
      }
    }
  </script>
  
</body>
</html>
